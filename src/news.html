---
templateEngineOverride: njk, md
layout: base.njk
---
    <section class="page-header">
        <div class="container">
            <h1>TIN TỨC & SỰ KIỆN</h1>
            <p>Cập nhật xu hướng bao bì và thông tin mới nhất từ Green Box</p>
        </div>
    </section>
    <section class="content-section">
        <div class="container content-container">
            <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 2rem;">
            {% for article in collections.news %}
            <div style="flex: 1 1 300px; max-width: 380px; text-align: left; background: white; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); padding: 2rem;">
                <h3 style="color: var(--primary-dark); font-size: 1.3rem; margin-bottom: 1rem;"><a href="{{ article.url }}" style="color: inherit; text-decoration: none;">{{ article.data.title }}</a></h3>
                <p style="color: #666; font-size: 0.9rem; margin-bottom: 1rem;">Ngày đăng: {{ article.date  if article.date else "Gần đây" }}</p>
                <a href="{{ article.url }}" class="btn-outline">Đọc tiếp <i class="fas fa-arrow-right"></i></a>
            </div>
            {% endfor %}
            </div>
        </div>
    </section>
