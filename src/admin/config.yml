backend:
  name: git-gateway
  branch: main

media_folder: "src/assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "pages"
    label: "Trang Tĩnh"
    files:
      - label: "Trang Chủ"
        name: "home"
        file: "src/index.html"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "base.njk"}
          - label: "Banner Chính (Hero Section)"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Tiêu đề lớn (Tên thương hiệu)", name: "title", widget: "string"}
              - {label: "Tiêu đề phụ (Slogan)", name: "subtitle", widget: "string"}
              - {label: "Đoạn văn mô tả", name: "description", widget: "text"}
              - {label: "Chữ trên nút bấm", name: "button_text", widget: "string"}
              - {label: "Đường dẫn nút bấm", name: "button_link", widget: "string"}
          - label: "Mục 2: Vì sao chọn Green Box"
            name: "features"
            widget: "object"
            fields:
              - {label: "Tiêu đề mục", name: "title", widget: "string"}
              - {label: "Mô tả mục", name: "subtitle", widget: "text"}
      - label: "Giới Thiệu"
        name: "about"
        file: "src/about.html"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "base.njk"}
          - {label: "Tiêu đề chính", name: "title", widget: "string"}
          - {label: "Mô tả phụ", name: "subtitle", widget: "string"}
          - {label: "Nội dung bài (Mã HTML)", name: "body", widget: "markdown"}
      - label: "Báo Giá"
        name: "pricing"
        file: "src/pricing.html"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "base.njk"}
          - {label: "Tiêu đề chính", name: "title", widget: "string"}
          - {label: "Mô tả phụ", name: "subtitle", widget: "string"}
          - {label: "Nội dung bảng giá (Mã HTML)", name: "body", widget: "markdown"}
      - label: "Liên Hệ"
        name: "contact"
        file: "src/contact.html"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "base.njk"}
          - {label: "Tiêu đề chính", name: "title", widget: "string"}
          - {label: "Mô tả phụ", name: "subtitle", widget: "string"}
          - {label: "Địa chỉ", name: "address", widget: "string"}
          - {label: "Hotline", name: "hotline", widget: "string"}
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Nội dung khác (Mã HTML)", name: "body", widget: "markdown"}

  - name: "news"
    label: "Tin Tức"
    folder: "src/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Tiêu đề bài viết", name: "title", widget: "string"}
      - {label: "Tác giả", name: "author", widget: "string", default: "Admin"}
      - {label: "Ngày đăng", name: "date", widget: "datetime"}
      - {label: "Nội dung bài viết", name: "body", widget: "markdown"}
