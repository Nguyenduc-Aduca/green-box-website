---
templateEngineOverride: njk, md
layout: base.njk
---
    <section class="page-header">
        <div class="container">
            <h1>DỊCH VỤ IN ẤN CHUYÊN NGHIỆP</h1>
            <p>Giải Pháp In Ấn Trọn Gói Cho Doanh Nghiệp</p>
        </div>
    </section>
    <section class="content-section">
        <div class="container content-container">
            {% for service in collections.services %}
            <div class="content-block" style="padding-top: 80px; margin-top: -40px;">
                <h2 style="color: var(--primary); text-transform: uppercase; border-bottom: 2px solid var(--primary); padding-bottom: 10px;">{{ service.data.title }}</h2>
                <p style="font-size: 1.1rem; line-height: 1.8;">{{ service.data.subtitle }}</p>
                <a href="{{ service.url }}" class="btn-accent" style="margin-top: 10px; display: inline-block;">Xem chi tiết</a>
            </div>
            {% endfor %}
        </div>
    </section>
