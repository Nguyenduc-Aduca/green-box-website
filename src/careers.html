---
templateEngineOverride: njk, md
layout: base.njk
---
    <section class="page-header">
        <div class="container">
            <h1>TUYỂN DỤNG TÀI NĂNG</h1>
            <p>Tham gia đội ngũ tiên phong trong lĩnh vực bao bì xanh</p>
        </div>
    </section>
    <section class="content-section">
        <div class="container content-container">
            <div style="background: white; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); overflow: hidden;">
                {% for job in collections.careers %}
                <div style="padding: 2rem; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
                    <div>
                        <h3 style="color: var(--primary-dark); font-size: 1.4rem; margin-bottom: 0.5rem;">{{ job.data.title }}</h3>
                    </div>
                    <a href="{{ job.url }}" class="btn-outline">Xem JD <i class="fas fa-arrow-right"></i></a>
                </div>
                {% endfor %}
            </div>
        </div>
    </section>
